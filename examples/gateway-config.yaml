apiVersion: sentinel.dev/v1
kind: GatewayConfig

gateway:
  listen: ":8080"
  data_dir: ".sentinel"
  auth: false
  cache_threshold: 0.95
  cache_ttl: 24h
  shadow_provider: ""

observability:
  otel_enabled: false
  otlp_endpoint: ""
  service_name: sentinel-gateway
  insecure: true
  timeout: 10s

providers:
  # Built-in providers (auto-detected type)
  - name: openai-prod
    type: openai
    api_key_env: OPENAI_API_KEY
  - name: anthropic-prod
    type: anthropic
    api_key_env: ANTHROPIC_API_KEY

  # Custom OpenAI-compatible providers - connects to any endpoint
  - name: ollama
    type: custom
    base_url: http://localhost:11434/v1
    models:
      - llama3.2
      - codellama
      - mistral

  - name: deepseek
    type: custom
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    models:
      - deepseek-chat
      - deepseek-coder

  - name: together
    type: custom
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    models:
      - meta-llama/Llama-3.3-70B-Instruct-Turbo
      - mistralai/Mixtral-8x22B-Instruct-v0.1

  # Azure OpenAI (uses api-key header instead of Bearer token)
  # - name: azure-gpt4o
  #   type: custom
  #   base_url: https://YOUR_RESOURCE.openai.azure.com/openai/deployments/gpt-4o/chat/completions?api-version=2024-10-21
  #   api_key_env: AZURE_OPENAI_API_KEY
  #   extra_headers:
  #     api-key: "${AZURE_OPENAI_API_KEY}"
  #   models:
  #     - gpt-4o

mcp:
  enabled: true
  policy: policies/production-delete.yaml
  upstream: http://127.0.0.1:8090/mcp

routes:
  fast-chat:
    variants:
      - name: openai-prod
        provider: "@openai-prod"
        model: "@openai-prod/gpt-4o-mini"
        weight: 100

  canary-chat:
    variants:
      - name: openai-baseline
        provider: "@openai-prod"
        model: "@openai-prod/gpt-4o-mini"
        weight: 90
      - name: anthropic-canary
        provider: "@anthropic-prod"
        model: "@anthropic-prod/claude-3-5-haiku-20241022"
        weight: 10
