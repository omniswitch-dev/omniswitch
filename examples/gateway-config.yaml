apiVersion: omniswitch.dev/v1
kind: GatewayConfig

gateway:
  listen: ":8080"
  data_dir: ".omniswitch"
  # Set true in production, along with OMNISWITCH_BOOTSTRAP_API_KEY on the first run.
  auth: true
  cache_threshold: 0.95
  cache_ttl: 24h
  # api_key is the safest default. workspace allows a workspace to share cache;
  # global must only be used for strictly public, tenant-independent prompts.
  cache_scope: api_key
  # Keep request and completion text out of SQLite unless explicitly needed.
  log_payloads: false
  cors_origins:
    - https://app.example.com
  circuit_breaker_failures: 5
  circuit_breaker_cooldown: 60s
  max_request_bytes: 10485760
  read_header_timeout: 5s
  read_timeout: 30s
  write_timeout: 0s
  idle_timeout: 60s
  shadow_provider: ""

# OmniSwitch uses a local sliding-window quota by default. Configure Redis to
# enforce the same fixed-window quota across every gateway replica.
rate_limit:
  requests: 120
  window: 1m
  # redis_url: redis://redis:6379/0
  prefix: omniswitch:ratelimit
  # Keep false in production: return 503 if the shared quota store is down.
  fail_open: false

authorization:
  # A deny rule always wins. If one or more allow rules are configured, callers
  # must match an allow rule as well. Variables: method, path, model,
  # api_key_id, subject, workspace_id, organization_id, role, and claims.
  rules:
    - name: prohibit-production-model-for-members
      when: 'role == "member" && model == "production-model"'
      effect: deny
      message: This model requires an administrator key

# Local API keys and OIDC workload tokens can coexist. Adding a JWKS endpoint
# automatically enables authentication, even when gateway.auth is omitted.
identity:
  oidc:
    # jwks_url: https://issuer.example.com/.well-known/jwks.json
    issuer: https://issuer.example.com/
    audience: omniswitch
    role_claim: roles
    workspace_claim: workspace_id
    organization_claim: organization_id
    cache_ttl: 5m

guardrails:
  # Supported actions: deny, redact, warn, and log. deny/redact change the
  # response; warn/log create structured guardrail audit events.
  actions:
    injection: deny
    pii: redact
  stream_buffer: true
  # Opt-in connector for a managed or in-house moderation service. The service
  # receives {stage, text, messages} and returns {triggered, message, details}
  # or {allowed}. Keep fail_open false for safety-critical checks.
  # webhooks:
  #   - name: managed-moderation
  #     url: https://guardrails.example.com/v1/check
  #     stage: input
  #     action: deny
  #     headers:
  #       authorization: "Bearer ${GUARDRAIL_API_KEY}"
  #     timeout: 3s
  #     fail_open: false
  rules:
    - name: block-internal-secret-marker
      stage: both
      pattern: '(?i)internal-secret'
      action: deny
      message: Sensitive marker detected

observability:
  otel_enabled: false
  otlp_endpoint: ""
  service_name: omniswitch-gateway
  insecure: true
  timeout: 10s
  prometheus_enabled: true

providers:
  # Built-in providers (auto-detected type)
  - name: openai-prod
    type: openai
    api_key_env: OPENAI_API_KEY
  - name: anthropic-prod
    type: anthropic
    api_key_env: ANTHROPIC_API_KEY

  # Custom OpenAI-compatible providers - connects to any endpoint
  - name: ollama
    type: custom
    base_url: http://localhost:11434/v1
    models:
      - llama3.2
      - codellama
      - mistral

  - name: deepseek
    type: custom
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    models:
      - deepseek-chat
      - deepseek-coder

  - name: together
    type: custom
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    models:
      - meta-llama/Llama-3.3-70B-Instruct-Turbo
      - mistralai/Mixtral-8x22B-Instruct-v0.1

  # Azure OpenAI (uses api-key header instead of Bearer token)
  # - name: azure-gpt4o
  #   type: custom
  #   base_url: https://YOUR_RESOURCE.openai.azure.com/openai/deployments/gpt-4o/chat/completions?api-version=2024-10-21
  #   api_key_env: AZURE_OPENAI_API_KEY
  #   extra_headers:
  #     api-key: "${AZURE_OPENAI_API_KEY}"
  #   models:
  #     - gpt-4o

mcp:
  enabled: true
  policy: policies/production-delete.yaml
  upstream: http://127.0.0.1:8090/mcp
  # HTTP MCP targets are federated at /mcp. OmniSwitch prefixes tools as
  # <target>__<tool> to avoid collisions and applies the target policy.
  targets:
    - name: github
      upstream: http://127.0.0.1:8091/mcp
      policy: policies/production-delete.yaml
      headers:
        x-api-key: "${GITHUB_MCP_TOKEN}"
      # Delegate the caller's OIDC bearer token, never an OmniSwitch API key.
      forward_bearer_token: false

    # A local stdio MCP server can run without an HTTP sidecar.
    # - name: filesystem
    #   transport: stdio
    #   command: npx
    #   args: ["-y", "@modelcontextprotocol/server-filesystem", "${WORKSPACE_ROOT}"]
    #   environment:
    #     LOG_LEVEL: warn

routes:
  fast-chat:
    default_params:
      temperature: 0.2
    override_params:
      max_tokens: 1000
    drop_params: [logprobs]
    timeout: 30s
    max_retries: 2
    retry_backoff: 500ms
    retry_codes: [429, 500, 502, 503, 504]
    fallbacks: ["@anthropic-prod"]
    variants:
      - name: openai-prod
        provider: "@openai-prod"
        model: "@openai-prod/gpt-4o-mini"
        weight: 100

  canary-chat:
    variants:
      - name: openai-baseline
        provider: "@openai-prod"
        model: "@openai-prod/gpt-4o-mini"
        weight: 90
      - name: anthropic-canary
        provider: "@anthropic-prod"
        model: "@anthropic-prod/claude-3-5-haiku-20241022"
        weight: 10
        # CEL variables: model and prompt
        condition: 'model == "canary-chat"'
