apiVersion: v1
kind: ConfigMap
metadata:
  name: omniswitch-config
  namespace: omniswitch
data:
  gateway.yaml: |
    apiVersion: omniswitch.dev/v1
    kind: GatewayConfig

    gateway:
      listen: ":8080"
      data_dir: /data
      auth: true
      cache_scope: api_key
      log_payloads: false
      read_header_timeout: 5s
      read_timeout: 30s
      write_timeout: 0s
      idle_timeout: 60s
      circuit_breaker_failures: 5
      circuit_breaker_cooldown: 60s

    rate_limit:
      requests: 120
      window: 1m
      redis_url: redis://omniswitch-redis:6379/0
      prefix: omniswitch:ratelimit
      fail_open: false

    guardrails:
      stream_buffer: true
      actions:
        injection: deny
        pii: redact

    observability:
      otel_enabled: false
      service_name: omniswitch-gateway
      prometheus_enabled: true

    providers:
      - name: openai-prod
        type: openai
        api_key_env: OPENAI_API_KEY

    routes:
      default-chat:
        variants:
          - provider: "@openai-prod"
            model: "@openai-prod/gpt-4o-mini"
            weight: 100
